name: Changelog Workflow

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
  issue_comment:
    types:
      - created

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    name: Check for Changelog Entry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if changelog entry exists
        id: check-changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const changelogPath = path.join(process.cwd(), 'CHANGELOG.md');

            if (!fs.existsSync(changelogPath)) {
              core.setOutput('has_entries', 'false');
              return;
            }

            const changelogContent = fs.readFileSync(changelogPath, 'utf8');

            // Check for entries under Unreleased section
            const unreleasedMatch = changelogContent.match(/## \[Unreleased\](.*?)(?=## |\Z)/s);

            if (unreleasedMatch && unreleasedMatch[1].trim()) {
              core.setOutput('has_entries', 'true');
            } else {
              core.setOutput('has_entries', 'false');
            }

            // Check for PR number in changelog
            const prNumber = context.issue.number;
            const hasPRReference = new RegExp(`#${prNumber}`).test(changelogContent);
            core.setOutput('has_pr_reference', hasPRReference.toString());

      - name: Comment on missing changelog entry
        if: steps.check-changelog.outputs.has_entries == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Changelog Entry Required

              This pull request requires a changelog entry in \`CHANGELOG.md\` for the release notes.

              The changelog should be added to the **Unreleased** section with one of the following categories:
              - **Added** for new features
              - **Changed** for changes in existing functionality
              - **Deprecated** for soon-to-be removed features
              - **Removed** for now-removed features
              - **Fixed** for any bug fixes
              - **Security** for security-related updates

              ### Example

              \`\`\`markdown
              ## [Unreleased]

              ### Added
              - Support for nested serializer error handling [#123](https://github.com/...)

              ### Fixed
              - Issue with pagination metadata formatting [#124](https://github.com/...)
              \`\`\`

              Please update the changelog and push the changes to this branch. 🙏`
            });

      - name: Add label if no changelog
        if: steps.check-changelog.outputs.has_entries == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['needs changelog']
            })

  update-changelog-for-release:
    needs: check-changelog
    runs-on: ubuntu-latest
    name: Update Changelog for Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if changelog entry exists for release
        id: check-changelog-for-release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const changelogPath = path.join(process.cwd(), 'CHANGELOG.md');

            if (!fs.existsSync(changelogPath)) {
              core.setFailed('Changelog file not found.');
              return;
            }

            const changelogContent = fs.readFileSync(changelogPath, 'utf8');

            // Check for entries under Unreleased section
            const unreleasedMatch = changelogContent.match(/## \[Unreleased\](.*?)(?=## |\Z)/s);

            if (!unreleasedMatch || !unreleasedMatch[1].trim()) {
              core.setFailed('No changelog entries found in the Unreleased section.');
              return;
            }

            // If we get here, there are entries
            const hasEntries = true;
            core.setOutput('has_entries', hasEntries.toString());

      - name: Update Changelog for Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get current date in YYYY-MM-DD format
            const today = new Date().toISOString().split('T')[0];

            const changelogPath = path.join(process.cwd(), 'CHANGELOG.md');
            let changelogContent = fs.readFileSync(changelogPath, 'utf8');

            // Extract the Unreleased section
            const unreleasedMatch = changelogContent.match(/(## \[Unreleased\].*?)(?=## |\Z)/s);

            if (!unreleasedMatch) {
              core.setFailed('Could not find Unreleased section in changelog.');
              return;
            }

            // Get the content of the Unreleased section
            const unreleasedContent = unreleasedMatch[0];

            // Replace [Unreleased] with current date formatted as YYYY-MM-DD
            const updatedChangelog = changelogContent.replace(/## \[Unreleased\].*?(?=## |\Z)/s, `## [${today}]`);

            fs.writeFileSync(changelogPath, updatedChangelog);

  create-release:
    needs: update-changelog-for-release
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag_name = context.ref.split('/').pop();

            // Get the content of the changelog file for release notes
            const fs = require('fs');
            const path = require('path');

            const changelogPath = path.join(process.cwd(), 'CHANGELOG.md');
            let changelogContent = fs.readFileSync(changelogPath, 'utf8');

            const unreleasedMatch = changelogContent.match(/## \[Unreleased\].*?(?=## |\Z)/s);

            if (!unreleasedMatch) {
              core.setFailed('Could not find Unreleased section in changelog.');
              return;
            }

            // Create release with the content from the Unreleased section
            await github.rest.repos.createRelease({
              owner: owner,
              repo: repo,
              tag_name: tag_name,
              name: tag_name,
              body: unreleasedMatch[0]
            });
